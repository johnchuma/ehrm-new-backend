syntax = "proto3";

package ehrm.tasks;

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (TaskResponse);
  rpc GetTask(GetTaskRequest) returns (TaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (TaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteResponse);
  rpc AssignTask(AssignTaskRequest) returns (TaskResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (TaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
}

message CreateTaskRequest {
  string companyId = 1;
  string title = 2;
  string description = 3;
  string priority = 4;
  string dueDate = 5;
  string assigneeId = 6;
  string category = 7;
  string createdBy = 8;
}

message GetTaskRequest {
  string id = 1;
}

message UpdateTaskRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string priority = 4;
  string dueDate = 5;
  string status = 6;
}

message DeleteTaskRequest {
  string id = 1;
}

message AssignTaskRequest {
  string id = 1;
  string assigneeId = 2;
}

message CompleteTaskRequest {
  string id = 1;
}

message ListTasksRequest {
  string companyId = 1;
  string assigneeId = 2;
  string status = 3;
  string priority = 4;
}

message ListTasksResponse {
  repeated TaskResponse tasks = 1;
}

message TaskResponse {
  string id = 1;
  string companyId = 2;
  string title = 3;
  string description = 4;
  string priority = 5;
  string dueDate = 6;
  string status = 7;
  string assigneeId = 8;
  string assigneeName = 9;
  string category = 10;
  string createdBy = 11;
  string createdAt = 12;
  string completedAt = 13;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}
