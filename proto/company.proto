syntax = "proto3";

package ehrm.company;

service CompanyService {
  rpc CreateCompany(CreateCompanyRequest) returns (CompanyResponse);
  rpc GetCompany(GetCompanyRequest) returns (CompanyResponse);
  rpc UpdateCompany(UpdateCompanyRequest) returns (CompanyResponse);
  rpc DeleteCompany(DeleteCompanyRequest) returns (DeleteResponse);
  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse);
}

service BranchService {
  rpc CreateBranch(CreateBranchRequest) returns (BranchResponse);
  rpc GetBranch(GetBranchRequest) returns (BranchResponse);
  rpc UpdateBranch(UpdateBranchRequest) returns (BranchResponse);
  rpc DeleteBranch(DeleteBranchRequest) returns (DeleteResponse);
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);
}

service DepartmentService {
  rpc CreateDepartment(CreateDepartmentRequest) returns (DepartmentResponse);
  rpc GetDepartment(GetDepartmentRequest) returns (DepartmentResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (DepartmentResponse);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (DeleteResponse);
  rpc ListDepartments(ListDepartmentsRequest) returns (ListDepartmentsResponse);
}

service CompanySettingsService {
  rpc GetSettings(GetSettingsRequest) returns (CompanySettingsResponse);
  rpc UpdateSettings(UpdateSettingsRequest) returns (CompanySettingsResponse);
}

message CreateCompanyRequest {
  string name = 1;
  string slug = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  string country = 6;
  string currency = 7;
  string timezone = 8;
  string logo = 9;
  string subscriptionPlan = 10;
  string industry = 11;
  string size = 12;
  string website = 13;
  string taxId = 14;
  string registrationNumber = 15;
}

message GetCompanyRequest {
  string id = 1;
}

message UpdateCompanyRequest {
  string id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  string logo = 6;
  string industry = 7;
  string size = 8;
  string website = 9;
  string taxId = 10;
  string registrationNumber = 11;
  string status = 12;
}

message DeleteCompanyRequest {
  string id = 1;
}

message ListCompaniesRequest {
  int32 page = 1;
  int32 pageSize = 2;
  string search = 3;
  string status = 4;
}

message ListCompaniesResponse {
  repeated CompanyResponse companies = 1;
  int32 total = 2;
}

message CompanyResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string email = 4;
  string phone = 5;
  string address = 6;
  string country = 7;
  string currency = 8;
  string timezone = 9;
  string logo = 10;
  string subscriptionPlan = 11;
  string industry = 12;
  string size = 13;
  string website = 14;
  string taxId = 15;
  string registrationNumber = 16;
  string status = 17;
  string createdAt = 18;
  string updatedAt = 19;
}

message CreateBranchRequest {
  string companyId = 1;
  string name = 2;
  string code = 3;
  string address = 4;
  string city = 5;
  string country = 6;
  string phone = 7;
  string email = 8;
  string managerId = 9;
}

message GetBranchRequest {
  string id = 1;
}

message UpdateBranchRequest {
  string id = 1;
  string name = 2;
  string code = 3;
  string address = 4;
  string city = 5;
  string phone = 6;
  string email = 7;
  string managerId = 8;
  bool isActive = 9;
}

message DeleteBranchRequest {
  string id = 1;
}

message ListBranchesRequest {
  string companyId = 1;
}

message ListBranchesResponse {
  repeated BranchResponse branches = 1;
}

message BranchResponse {
  string id = 1;
  string companyId = 2;
  string name = 3;
  string code = 4;
  string address = 5;
  string city = 6;
  string country = 7;
  string phone = 8;
  string email = 9;
  string managerId = 10;
  bool isActive = 11;
  string createdAt = 12;
}

message CreateDepartmentRequest {
  string companyId = 1;
  string branchId = 2;
  string name = 3;
  string code = 4;
  string description = 5;
  string headId = 6;
  string parentId = 7;
}

message GetDepartmentRequest {
  string id = 1;
}

message UpdateDepartmentRequest {
  string id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
  string headId = 5;
  string branchId = 6;
  string parentId = 7;
}

message DeleteDepartmentRequest {
  string id = 1;
}

message ListDepartmentsRequest {
  string companyId = 1;
  string branchId = 2;
}

message ListDepartmentsResponse {
  repeated DepartmentResponse departments = 1;
}

message DepartmentResponse {
  string id = 1;
  string companyId = 2;
  string branchId = 3;
  string name = 4;
  string code = 5;
  string description = 6;
  string headId = 7;
  string parentId = 8;
  bool isActive = 9;
  string createdAt = 10;
}

message GetSettingsRequest {
  string companyId = 1;
}

message UpdateSettingsRequest {
  string companyId = 1;
  string payrollCycle = 2;
  string leavePolicy = 3;
  string workHours = 4;
  string overtimeRate = 5;
  string taxSettings = 6;
  string notificationSettings = 7;
  string themeSettings = 8;
  string generalSettings = 9;
}

message CompanySettingsResponse {
  string id = 1;
  string companyId = 2;
  string payrollCycle = 3;
  string leavePolicy = 4;
  string workHours = 5;
  string overtimeRate = 6;
  string taxSettings = 7;
  string notificationSettings = 8;
  string themeSettings = 9;
  string generalSettings = 10;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}
