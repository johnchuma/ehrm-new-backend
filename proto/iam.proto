syntax = "proto3";

package ehrm.iam;

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc LoginWithPhone(LoginWithPhoneRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc AssignRole(AssignRoleRequest) returns (UserResponse);
  rpc RemoveRole(RemoveRoleRequest) returns (UserResponse);
}

service RoleService {
  rpc CreateRole(CreateRoleRequest) returns (RoleResponse);
  rpc GetRole(GetRoleRequest) returns (RoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (RoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc AssignPermission(AssignPermissionRequest) returns (RoleResponse);
}

service PermissionService {
  rpc CreatePermission(CreatePermissionRequest) returns (PermissionResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string companyId = 3;
}

message LoginWithPhoneRequest {
  string phone = 1;
  string password = 2;
  string companyId = 3;
}

message RegisterRequest {
  string email = 1;
  string phone = 2;
  string password = 3;
  string firstName = 4;
  string lastName = 5;
  string companyId = 6;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
  UserResponse user = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  UserResponse user = 2;
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message ForgotPasswordRequest {
  string email = 1;
  string companyId = 2;
}

message ForgotPasswordResponse {
  string message = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string newPassword = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

message ChangePasswordRequest {
  string userId = 1;
  string oldPassword = 2;
  string newPassword = 3;
}

message ChangePasswordResponse {
  string message = 1;
}

message LogoutRequest {
  string userId = 1;
}

message LogoutResponse {
  string message = 1;
}

message CreateUserRequest {
  string email = 1;
  string phone = 2;
  string password = 3;
  string firstName = 4;
  string lastName = 5;
  string companyId = 6;
  string employeeId = 7;
  repeated string roleIds = 8;
  bool isActive = 9;
}

message GetUserRequest {
  string id = 1;
  string companyId = 2;
}

message UpdateUserRequest {
  string id = 1;
  string email = 2;
  string phone = 3;
  string firstName = 4;
  string lastName = 5;
  bool isActive = 6;
  repeated string roleIds = 7;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message ListUsersRequest {
  string companyId = 1;
  int32 page = 2;
  int32 pageSize = 3;
  string search = 4;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 pageSize = 4;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string phone = 3;
  string firstName = 4;
  string lastName = 5;
  string fullName = 6;
  string companyId = 7;
  string employeeId = 8;
  bool isActive = 9;
  bool emailVerified = 10;
  bool phoneVerified = 11;
  repeated RoleResponse roles = 12;
  string createdAt = 13;
  string updatedAt = 14;
  string lastLoginAt = 15;
}

message AssignRoleRequest {
  string userId = 1;
  string roleId = 2;
}

message RemoveRoleRequest {
  string userId = 1;
  string roleId = 2;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
  string companyId = 3;
  repeated string permissionIds = 4;
}

message GetRoleRequest {
  string id = 1;
}

message UpdateRoleRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string permissionIds = 4;
}

message DeleteRoleRequest {
  string id = 1;
}

message ListRolesRequest {
  string companyId = 1;
}

message ListRolesResponse {
  repeated RoleResponse roles = 1;
}

message RoleResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string companyId = 4;
  bool isSystem = 5;
  repeated PermissionResponse permissions = 6;
  string createdAt = 7;
}

message AssignPermissionRequest {
  string roleId = 1;
  string permissionId = 2;
}

message CreatePermissionRequest {
  string name = 1;
  string resource = 2;
  string action = 3;
  string description = 4;
}

message PermissionResponse {
  string id = 1;
  string name = 2;
  string resource = 3;
  string action = 4;
  string description = 5;
}

message ListPermissionsRequest {}

message ListPermissionsResponse {
  repeated PermissionResponse permissions = 1;
}
