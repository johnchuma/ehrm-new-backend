syntax = "proto3";

package ehrm.hrquery;

service HRQueryService {
  rpc AskQuestion(AskQuestionRequest) returns (QueryResponse);
  rpc GetFAQs(GetFAQsRequest) returns (ListFAQsResponse);
  rpc CreateFAQ(CreateFAQRequest) returns (FAQResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc CreateTicket(CreateTicketRequest) returns (TicketResponse);
  rpc ReplyTicket(ReplyTicketRequest) returns (TicketResponse);
}

message AskQuestionRequest {
  string companyId = 1;
  string userId = 2;
  string question = 3;
  string category = 4;
}

message QueryResponse {
  string answer = 1;
  string confidence = 2;
  repeated string relatedQuestions = 3;
  repeated FAQItem relatedFAQs = 4;
}

message GetFAQsRequest {
  string companyId = 1;
  string category = 2;
}

message ListFAQsResponse {
  repeated FAQItem faqs = 1;
}

message FAQItem {
  string id = 1;
  string question = 2;
  string answer = 3;
  string category = 4;
  int32 views = 5;
  double helpfulness = 6;
}

message CreateFAQRequest {
  string companyId = 1;
  string question = 2;
  string answer = 3;
  string category = 4;
}

message FAQResponse {
  string id = 1;
  string companyId = 2;
  string question = 3;
  string answer = 4;
  string category = 5;
  int32 views = 6;
  double helpfulness = 7;
  string createdAt = 8;
}

message ListTicketsRequest {
  string companyId = 1;
  string userId = 2;
  string status = 3;
}

message ListTicketsResponse {
  repeated TicketResponse tickets = 1;
}

message CreateTicketRequest {
  string companyId = 1;
  string userId = 2;
  string subject = 3;
  string description = 4;
  string category = 5;
  string priority = 6;
}

message ReplyTicketRequest {
  string id = 1;
  string reply = 2;
  string userId = 3;
}

message TicketResponse {
  string id = 1;
  string companyId = 2;
  string userId = 3;
  string userName = 4;
  string subject = 5;
  string description = 6;
  string category = 7;
  string priority = 8;
  string status = 9;
  repeated TicketReply replies = 10;
  string createdAt = 11;
  string closedAt = 12;
}

message TicketReply {
  string id = 1;
  string userId = 2;
  string userName = 3;
  string message = 4;
  string createdAt = 5;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}
